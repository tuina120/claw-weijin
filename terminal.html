<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw 网页终端</title><link rel="stylesheet" href="./terminal.css" />
  </head>
  <body class="term-body">
    <header class="term-header">
      <div>
        <p class="term-tag">WEB TERMINAL</p>
        <h1>OpenClaw 网页终端</h1>
        <p class="term-sub">全功能 shell 执行模式（支持管道/重定向）。</p>
      </div>
      <div class="term-header-actions">
        <a class="header-link" href="./services.html">返回导航页</a>
      </div>
    </header>

    <main class="term-layout">
      <section class="panel panel-side">
        <div class="panel-head">
          <h2>设置</h2>
          <button id="term-reload-btn" class="btn btn-ghost" type="button">刷新信息</button>
        </div>

        <div class="field">
          <label for="term-cwd">工作目录</label>
          <input id="term-cwd" type="text" placeholder="/home/weijin/codex/openclaw" />
        </div>

        <div id="term-token-wrap" class="field hidden">
          <label for="term-token">终端 Token</label>
          <input id="term-token" type="password" autocomplete="off" placeholder="需要时填写" />
          <p class="hint">发布到公网时建议设置环境变量 `OPENCLAW_TERMINAL_TOKEN`。</p>
        </div>

        <div class="field">
          <label>快捷命令</label>
          <div class="quick-grid">
            <button class="btn btn-ghost quick" data-cmd="pwd" type="button">pwd</button>
            <button class="btn btn-ghost quick" data-cmd="ls" type="button">ls</button>
            <button class="btn btn-ghost quick" data-cmd="systemctl --user status openclaw-web.service" type="button">
              web 状态
            </button>
            <button class="btn btn-ghost quick" data-cmd="journalctl --user -u openclaw-web.service -n 120 --no-pager" type="button">
              web 日志
            </button>
            <button class="btn btn-ghost quick" data-cmd="systemctl --user status openclaw-bridge.service" type="button">
              bridge 状态
            </button>
            <button class="btn btn-ghost quick" data-cmd="journalctl --user -u openclaw-bridge.service -n 120 --no-pager" type="button">
              bridge 日志
            </button>
          </div>
        </div>

        <details class="field">
          <summary>命令执行模式</summary>
          <pre id="term-allowed" class="mono pre-box"></pre>
        </details>
      </section>

      <section class="panel panel-main">
        <div id="term-output" class="term-output" aria-label="终端输出"></div>
        <div class="term-input">
          <input id="term-command" type="text" placeholder="输入命令（支持管道/重定向）" />
          <button id="term-run-btn" class="btn btn-primary" type="button">执行</button>
        </div>
        <div class="term-footer">
          <span id="term-status">状态：就绪</span>
          <button id="term-clear-btn" class="btn btn-ghost" type="button">清空输出</button>
        </div>
      </section>
    </main>

    <script src="./terminal.js"></script>
  </body>
</html>
